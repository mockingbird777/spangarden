<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title description">
  <title id="title">SpanGarden social preview</title>
  <desc id="description">SpanGarden turns agent traces into critical paths, retry-loop signals, model and tool usage, and local cost estimates.</desc>
  <defs>
    <linearGradient id="background" x1="80" y1="32" x2="1170" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#102A20"/>
      <stop offset="0.5" stop-color="#08140F"/>
      <stop offset="1" stop-color="#07100C"/>
    </linearGradient>
    <linearGradient id="vine" x1="88" y1="470" x2="480" y2="112" gradientUnits="userSpaceOnUse">
      <stop stop-color="#72D8EE"/>
      <stop offset="0.55" stop-color="#82F6B3"/>
      <stop offset="1" stop-color="#CBF36B"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(270 320) rotate(5) scale(390 350)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2E8A5A" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#2E8A5A" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#C7E8D3" stroke-opacity="0.042"/>
    </pattern>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>

  <rect width="1280" height="640" rx="28" fill="url(#background)"/>
  <rect width="1280" height="640" rx="28" fill="url(#grid)"/>
  <ellipse cx="275" cy="320" rx="410" ry="360" fill="url(#glow)"/>
  <circle cx="1090" cy="62" r="185" fill="#236D66" opacity="0.12" filter="url(#softGlow)"/>

  <g transform="translate(76 84)">
    <rect x="0" y="0" width="390" height="472" rx="28" fill="#0C1913" stroke="#294536" stroke-width="2"/>
    <text x="28" y="42" fill="#799787" font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="750" letter-spacing="1.4">TRACE · GARDEN-DEMO-01</text>
    <g transform="translate(28 77)" font-family="Inter, ui-sans-serif, system-ui">
      <rect width="334" height="68" rx="14" fill="#12251C" stroke="#294536"/>
      <text x="17" y="25" fill="#89A494" font-size="12">CRITICAL PATH</text>
      <text x="17" y="50" fill="#E8F3EC" font-size="19" font-weight="750">3.93s · agent → final answer</text>
    </g>
    <g transform="translate(54 183)" fill="none" stroke="url(#vine)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 12c38 0 28 53 68 53s30-35 71-35 34 82 79 82 40 47 80 47"/>
      <path d="M147 30c5 51-8 88-43 112" stroke-width="3" opacity="0.62"/>
      <path d="M226 112c4 55-10 88-45 116" stroke-width="3" opacity="0.62"/>
    </g>
    <g transform="translate(54 183)">
      <circle cx="8" cy="12" r="12" fill="#0C1913" stroke="#72D8EE" stroke-width="6"/>
      <circle cx="76" cy="65" r="12" fill="#0C1913" stroke="#82F6B3" stroke-width="6"/>
      <circle cx="147" cy="30" r="12" fill="#0C1913" stroke="#CBF36B" stroke-width="6"/>
      <circle cx="226" cy="112" r="12" fill="#0C1913" stroke="#FF7890" stroke-width="6"/>
      <circle cx="306" cy="159" r="12" fill="#0C1913" stroke="#82F6B3" stroke-width="6"/>
      <circle cx="104" cy="142" r="9" fill="#0C1913" stroke="#FFC66D" stroke-width="5"/>
      <circle cx="181" cy="228" r="9" fill="#0C1913" stroke="#FFC66D" stroke-width="5"/>
    </g>
    <g transform="translate(28 392)" font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="700">
      <rect width="92" height="38" rx="10" fill="#12251C" stroke="#294536"/><text x="16" y="24" fill="#82F6B3">6 SPANS</text>
      <g transform="translate(104 0)"><rect width="96" height="38" rx="10" fill="#221A17" stroke="#5B3E33"/><text x="15" y="24" fill="#FF9A82">2 ERRORS</text></g>
      <g transform="translate(212 0)"><rect width="122" height="38" rx="10" fill="#201D12" stroke="#554B29"/><text x="15" y="24" fill="#FFC66D">2 RETRIES</text></g>
    </g>
  </g>

  <g transform="translate(530 104)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g><rect width="216" height="36" rx="18" fill="#14261D" stroke="#315240"/><circle cx="20" cy="18" r="5" fill="#82F6B3"/><text x="36" y="23" fill="#BCD2C4" font-size="14" font-weight="700" letter-spacing="1.2">AGENT OBSERVABILITY</text></g>
    <text x="0" y="113" fill="#F0F7F2" font-size="67" font-weight="800" letter-spacing="-2.8">SpanGarden</text>
    <text x="0" y="181" fill="#D3E3D8" font-size="33" font-weight="650" letter-spacing="-0.7">Turn agent traces</text>
    <text x="0" y="223" fill="#D3E3D8" font-size="33" font-weight="650" letter-spacing="-0.7">into answers.</text>
    <text x="0" y="279" fill="#88A395" font-size="19">Find the slow path, retry loops, errors, and usage locally.</text>

    <g transform="translate(0 326)" font-size="15" font-weight="700">
      <g><rect width="152" height="43" rx="10" fill="#102018" stroke="#294536"/><text x="18" y="27" fill="#A7C1B2">CRITICAL PATHS</text></g>
      <g transform="translate(164 0)"><rect width="142" height="43" rx="10" fill="#102018" stroke="#294536"/><text x="18" y="27" fill="#A7C1B2">LOOP SIGNALS</text></g>
      <g transform="translate(318 0)"><rect width="186" height="43" rx="10" fill="#102018" stroke="#294536"/><text x="18" y="27" fill="#A7C1B2">MODEL / TOOL USAGE</text></g>
    </g>
    <g transform="translate(0 400)" font-size="16">
      <circle cx="6" cy="7" r="6" fill="#82F6B3"/><text x="24" y="13" fill="#ACC3B5">local-first</text>
      <circle cx="139" cy="7" r="6" fill="#72D8EE"/><text x="157" y="13" fill="#ACC3B5">shareable HTML</text>
      <circle cx="325" cy="7" r="6" fill="#CBF36B"/><text x="343" y="13" fill="#ACC3B5">zero runtime dependencies</text>
    </g>
  </g>

  <text x="1190" y="590" text-anchor="end" fill="#526C5E" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15">github.com/mockingbird777/spangarden</text>
</svg>
