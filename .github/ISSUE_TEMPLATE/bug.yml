name: Bug report
description: Report a reproducible problem without sharing sensitive traces.
title: "[bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Please sanitize every trace excerpt before posting."
  - type: input
    id: version
    attributes:
      label: SpanGarden version
      placeholder: 0.1.0
    validations:
      required: true
  - type: dropdown
    id: input
    attributes:
      label: Input shape
      options: [Generic JSON, JSONL, OpenTelemetry, gzip, Other]
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal sanitized reproduction
      description: Include the command and synthetic input only.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
